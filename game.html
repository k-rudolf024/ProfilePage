<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲーム</title>
<style>
:root {
  --accent: #ff8c00;
  --bg: #000;
  --text: #fff;
  --sub: #bbb;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  margin: 0;
  padding: 40px 20px;
}

a { color: var(--accent); }

.card {
  border: 2px solid var(--accent);
  border-radius: 10px;
  padding: 20px;
  margin-top: 20px;
}

.card:hover {
  background: var(--accent);
  color: #000;
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
}

.desc {
  color: var(--sub);
}

.card:hover .desc {
  color: #222;
}
</style>
</head>

<body>

<a href="index.html">← Back</a>
<h1>ゲーム</h1>

<div class="card">
  <div class="title">ミニゲーム①</div>
  <div class="desc">制作途中の試作ゲーム</div>
</div>

<div class="card">
  <div class="title">アクション試作</div>
  <div class="desc">Unityで開発中</div>
</div>

</body>
</html>
