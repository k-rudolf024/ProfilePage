<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTAU作品</title>

<style>
:root {
  --accent: #ff8c00;
  --bg: #000;
  --text: #fff;
  --sub: #bbb;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

.header {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  z-index: 1000;
}

.header img {
  width: 30px;
  height: 30px;
}

.icon-wrap {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.icon-wrap img {
  width: 70%;
  height: 70%;
  object-fit: contain;
}
  
.header span {
  font-size: 14px;
  letter-spacing: 1px;
}

h1 {
  margin-top: 60px;
  font-size: 24px;
  letter-spacing: 2px;
  position: relative;
  text-align: center;
}

h1::after {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: -8px;
  width: 120%;
  height: 5px;
  background-color: var(--accent);
  border-radius: 3px;
}

.video {
  margin-top: 40px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  text-align: center;
}

.video iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(255,140,0,0.4);
}

.desc {
  color: var(--sub);
  margin-top: 10px;
  font-size: 14px;
}

@media(max-width:600px){

  .header img {
    width: 36px;
    height: 36px;
  }

  .header span {
    font-size: 16px;
  }

  h1::after {
    width: 100%;
    height: 6px;
  }

}
</style>
</head>

<body>

<a href="index.html" class="header">
  <div class="icon-wrap">
    <img src="icon.png" alt="logo">
  </div>
  <span>カルド</span>
</a>

<h1>UTAU作品</h1>

<div class="video">
  <iframe src="https://www.youtube.com/embed/動画ID" loading="lazy"></iframe>
  <div class="desc">獣人音源でのカバー作品</div>
</div>

<div class="video">
  <iframe src="https://www.youtube.com/embed/動画ID" loading="lazy"></iframe>
  <div class="desc">製作中</div>
</div>

</body>
</html>
