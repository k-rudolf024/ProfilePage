<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クリックゲーム</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
    }
    button {
      font-size: 20px;
      padding: 15px;
      margin: 10px;
    }
  </style>
</head>
<body>

  <h1>クリックゲーム</h1>
  <p>スコア: <span id="score">0</span></p>
  <p>残り時間: <span id="time">10</span>秒</p>

  <button id="clickBtn">クリック！</button><br>
  <button id="resetBtn">リセット</button>

  <script>
    let score = 0;
    let time = 10;
    let gameActive = false;
    let timer = null;

    const scoreDisplay = document.getElementById("score");
    const timeDisplay = document.getElementById("time");
    const clickBtn = document.getElementById("clickBtn");
    const resetBtn = document.getElementById("resetBtn");

    function startTimer() {
      timer = setInterval(() => {
        time--;
        timeDisplay.textContent = time;

        if (time <= 0) {
          clearInterval(timer);
          gameActive = false;
          alert("ゲーム終了！スコア: " + score);
        }
      }, 1000);
    }

    clickBtn.addEventListener("click", () => {
      // 初回クリックでゲーム開始
      if (!gameActive && time === 10) {
        gameActive = true;
        startTimer();
      }

      if (gameActive) {
        score++;
        scoreDisplay.textContent = score;
      }
    });

    resetBtn.addEventListener("click", () => {
      clearInterval(timer);
      score = 0;
      time = 10;
      gameActive = false;

      scoreDisplay.textContent = score;
      timeDisplay.textContent = time;
    });
  </script>

</body>
</html>
