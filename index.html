<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カルド ProfilePage</title>
  <style>
    :root {
      --accent: #ff8c00;
      --text-main: #ffffff;
      --text-sub: #bbbbbb;
      --bg: #000000;
    }

    body {
      margin: 0;
      height: 100vh;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
    }

    h1 {
      margin-top: 20px;
      font-size: 24px;
      letter-spacing: 2px;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.2s;
      opacity: 0;
      position: relative;
    }

    h1::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -6px;
      width: 100%;
      height: 4px;
      background-color: var(--accent);
      opacity: 0.7;
      border-radius: 3px;
    }
    
    .bio {
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-sub);
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.3s;
      opacity: 0;
    }

    .links {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.5s;
      opacity: 0;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 18px;
      padding: 10px 20px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      transition: 0.3s;
    }

    .links a:hover {
      background-color: var(--accent);
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 15px var(--accent);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="icon.png" alt="icon" class="icon">

    <h1>カルド</h1>

    <p class="bio">
      けもなーの端くれ<br>
      UTAU獣人カバーが好き<br>
      いずれは絵とかゲームとかも出したいなと
    </p>

    <div class="links">
      <a href="https://x.com/k_rudolf024" target="_blank">X</a>
      <a href="https://www.youtube.com/@k_rudolf" target="_blank">YouTube</a>
    </div>
  </div>

</body>
</html>
