<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カルド ProfilePage</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid orange;
      object-fit: cover;
    }

    h1 {
      margin-top: 20px;
      font-size: 24px;
      letter-spacing: 2px;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.2s;
      opacity: 0;
    }

    .bio {
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.6;
      color: #ccc;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.3s;
      opacity: 0;
    }

    .links {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.5s;
      opacity: 0;
    }

    .links a {
      color: orange;
      text-decoration: none;
      font-size: 18px;
      padding: 10px 20px;
      border: 2px solid orange;
      border-radius: 8px;
      transition: 0.3s;
    }

    .links a:hover {
      background-color: orange;
      color: #000;
      transform: scale(1.1);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="icon.png" alt="icon" class="icon">

    <h1>カルド</h1>

    <!-- 自己紹介 -->
    <p class="bio">
      けもなーの端くれ<br>
      UTAU獣人カバーが好き<br>
      いずれは絵とかゲームとかも出したいなと
    </p>

    <div class="links">
      <a href="https://x.com/k_rudolf024" target="_blank">X</a>
      <a href="https://www.youtube.com/@k_rudolf" target="_blank">YouTube</a>
    </div>
  </div>

</body>
</html>
