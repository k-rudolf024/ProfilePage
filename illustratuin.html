<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>イラスト</title>
<style>
:root {
  --accent: #ff8c00;
  --bg: #000;
  --text: #fff;
  --sub: #bbb;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  margin: 0;
  padding: 40px 20px;
}

a { color: var(--accent); }

h1 {
  border-bottom: 2px solid var(--accent);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 30px;
}

img {
  width: 100%;
  border: 2px solid var(--accent);
  border-radius: 10px;
}

.caption {
  font-size: 12px;
  color: var(--sub);
}

@media(max-width:600px){
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<a href="index.html">← Back</a>
<h1>イラスト</h1>

<div class="grid">
  <div>
    <img src="img1.png">
    <div class="caption">キャラデザイン①</div>
  </div>

  <div>
    <img src="img2.png">
    <div class="caption">練習絵</div>
  </div>
</div>

</body>
</html>
