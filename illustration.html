<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イラスト</title>

<style>
:root {
  --accent: #ff8c00;
  --bg: #000;
  --text: #fff;
  --sub: #bbb;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

/* ===== ヘッダー（左上ロゴ） ===== */
.header {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  z-index: 1000;
}

.header img {
  width: 30px;
  height: 30px;
}

.header span {
  font-size: 14px;
  letter-spacing: 1px;
}

/* ===== タイトル ===== */
h1 {
  margin-top: 60px;
  font-size: 24px;
  letter-spacing: 2px;
  position: relative;
  text-align: center;
}

/* 下線（太く＆中央） */
h1::after {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: -8px;
  width: 120%;
  height: 5px;
  background-color: var(--accent);
  border-radius: 3px;
}

/* ===== グリッド ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 40px;
}

img {
  width: 100%;
  border: 2px solid var(--accent);
  border-radius: 10px;
}

.caption {
  font-size: 12px;
  color: var(--sub);
  margin-top: 5px;
}

/* ===== スマホ対応 ===== */
@media(max-width:600px){

  body {
    padding: 15px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .header img {
    width: 36px; /* 押しやすく */
    height: 36px;
  }

  .header span {
    font-size: 16px;
  }

  h1::after {
    width: 100%;
    height: 6px; /* 少し太く */
  }
}
</style>
</head>

<body>

<!-- 左上ホーム -->
<a href="index.html" class="header">
  <img src="icon.png" alt="logo">
  <span>カルド</span>
</a>

<h1>イラスト</h1>

<div class="grid">
  <div>
    <img src="img1.png">
    <div class="caption">キャラデザイン①</div>
  </div>

  <div>
    <img src="img2.png">
    <div class="caption">練習絵</div>
  </div>
</div>

</body>
</html>
